# GitHub Actions CI/CD Pipeline
# Comprehensive testing and deployment workflow

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  DATABASE_URL: file:./prisma/data/test.db
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  # ==========================================
  # Job 1: Setup and Install Dependencies
  # ==========================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.node-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

  # ==========================================
  # Job 2: Lint and Type Check
  # ==========================================
  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run TypeScript check
        run: npm run typecheck
        continue-on-error: true

  # ==========================================
  # Job 3: Unit and Integration Tests
  # ==========================================
  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run Jest tests
        run: npm test -- --coverage --coverageReporters=text-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ==========================================
  # Job 4: Build Application
  # ==========================================
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: |
            .next/
            public/
            prisma/
            package*.json

  # ==========================================
  # Job 5: E2E Tests with Agent-Browser
  # ==========================================
  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-output

      - name: Install production dependencies
        run: npm ci --only=production

      - name: Create test database
        run: |
          mkdir -p prisma/data
          npx prisma migrate deploy

      - name: Start application in background
        run: |
          npm start &
          sleep 10
        env:
          PORT: 3000
          NODE_ENV: production

      - name: Wait for application to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000 > /dev/null 2>&1; then
              echo "Application is ready!"
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 2
          done
          echo "Application failed to start"
          exit 1

      - name: Run E2E tests
        run: node scripts/e2e-agent.js
        env:
          TEST_URL: http://localhost:3000

      - name: Upload E2E test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-results
          path: |
            e2e-results/
            logs/

  # ==========================================
  # Job 6: Docker Build (optional)
  # ==========================================
  docker:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t sentiment-dash:latest .
          docker images

      - name: Test Docker container
        run: |
          docker run -d --name test-container -p 3000:3000 sentiment-dash:latest
          sleep 15
          curl -f http://localhost:3000 || exit 1
          docker stop test-container
          docker rm test-container

  # ==========================================
  # Job 7: Deploy (Production)
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: [e2e, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production..."
          # Add your deployment commands here
          # Examples:
          # - Deploy to Vercel: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
          # - Deploy to AWS: aws ecs update-service --cluster prod --service sentiment-dash --force-new-deployment
          # - Deploy via SSH: ssh user@server 'cd /app && docker-compose pull && docker-compose up -d'
          echo "✅ Deployment complete!"

      - name: Post-deployment health check
        run: |
          echo "Checking production health..."
          # curl -f https://your-production-url.com/api/health
          echo "✅ Health check passed!"
