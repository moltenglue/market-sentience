# GitHub Actions CI/CD Pipeline
# Comprehensive testing and deployment workflow

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  DATABASE_URL: file:./prisma/data/test.db

jobs:
  # ==========================================
  # Job 1: Lint and Type Check
  # ==========================================
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./prisma/data/dev.db

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run TypeScript check
        run: npm run typecheck
        continue-on-error: true

  # ==========================================
  # Job 2: Unit and Integration Tests
  # ==========================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./prisma/data/test.db

      - name: Setup test database
        run: |
          mkdir -p prisma/data
          touch prisma/data/test.db
        env:
          DATABASE_URL: file:./prisma/data/test.db

      - name: Run Jest tests
        run: npm test -- --coverage --coverageReporters=text-summary --coverageReporters=lcov
        continue-on-error: true
        env:
          DATABASE_URL: file:./prisma/data/test.db

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/
            junit.xml

  # ==========================================
  # Job 3: Build Application
  # ==========================================
  build:
    name: 📦 Build Application
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./prisma/data/dev.db

      - name: Build Next.js application
        run: npm run build
        continue-on-error: true
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: file:./prisma/data/dev.db

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/
            public/
            prisma/
            package*.json
            next.config.ts
            tsconfig.json
            node_modules/.prisma/

  # ==========================================
  # Job 4: E2E Tests
  # ==========================================
  e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./prisma/data/test.db

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: file:./prisma/data/test.db

      - name: Setup database
        run: |
          mkdir -p prisma/data
          touch prisma/data/test.db
        env:
          DATABASE_URL: file:./prisma/data/test.db

      - name: Start application
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          PORT: 3000
          NODE_ENV: production
          DATABASE_URL: file:./prisma/data/test.db

      - name: Run E2E tests
        run: node scripts/e2e-agent.js
        env:
          TEST_URL: http://localhost:3000

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            e2e-results/
            logs/

  # ==========================================
  # Job 5: Docker Build Test
  # ==========================================
  docker-test:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t sentiment-dash:test .
          docker images

      - name: Test Docker container
        run: |
          docker run -d \
            --name test-container \
            -p 3000:3000 \
            -e DATABASE_URL=file:./prisma/data/test.db \
            sentiment-dash:test
          
          # Wait for container to be ready
          sleep 20
          
          # Test health endpoint
          curl -f http://localhost:3000/api/health || exit 1
          
          # Cleanup
          docker stop test-container
          docker rm test-container

  # ==========================================
  # Job 6: Security Scan
  # ==========================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
